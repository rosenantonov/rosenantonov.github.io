<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | NEXT-GEN OPERA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 3D КАНВАС ФОН */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* МАГНИТНИ БУТОНИ */
        .nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            padding: 25px; z-index: 1000;
            mix-blend-mode: difference; /* Прави менюто видимо върху всякакъв фон */
        }

        .btn {
            color: var(--gold);
            text-decoration: none;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        /* ГЛАВЕН ТЕКСТ С ЕФЕКТ "DEPTH" */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .main-title {
            font-size: clamp(2rem, 8vw, 5rem);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 15px;
            margin: 0;
            transform-style: preserve-3d;
            text-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        /* СЕКЦИЯ С ВИДЕО - СТЪКЛЕН ЕФЕКТ */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            padding: 40px;
            margin: 100px auto;
            max-width: 900px;
            width: 90%;
            transition: 0.5s;
        }

        .glass-card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        video {
            width: 100%;
            border-radius: 20px;
            filter: grayscale(0.5) contrast(1.1);
            transition: 0.5s;
        }

        video:hover { filter: grayscale(0) contrast(1); }

    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="particles-js"></div>
    </div>

    <nav class="nav">
        <a href="#video" class="btn mag">Video</a>
        <a href="#about" class="btn mag">Gallery</a>
        <a href="#buy" class="btn mag">Shop</a>
        <a href="#" class="btn mag">FB</a>
    </nav>

    <section class="hero">
        <h1 class="main-title" id="title">Rosen Antonov</h1>
        <p style="color: var(--gold); opacity: 0.6; letter-spacing: 5px;">DRAMATIC TENOR</p>
    </section>

    <div id="video" class="glass-card" data-aos="fade-up">
        <video controls playsinline>
            <source src="Video1.mp4" type="video/mp4">
        </video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init();

        // 1. ПАРАЛАКС ЕФЕКТ НА ИМЕТО
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            gsap.to("#title", {
                rotationY: x,
                rotationX: y,
                duration: 1,
                ease: "power2.out"
            });
        });

        // 2. MAGNETIC БУТОНИ
        const magnets = document.querySelectorAll('.mag');
        magnets.forEach((m) => {
            m.addEventListener('mousemove', (e) => {
                const pos = m.getBoundingClientRect();
                const x = e.clientX - pos.left - pos.width / 2;
                const y = e.clientY - pos.top - pos.height / 2;
                gsap.to(m, { x: x * 0.5, y: y * 0.5, duration: 0.3 });
            });
            m.addEventListener('mouseleave', () => {
                gsap.to(m, { x: 0, y: 0, duration: 0.5, ease: "elastic.out(1, 0.3)" });
            });
        });

        // 3. ПАРТИКЪЛ ФОН
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100 },
                "color": { "value": "#d4af37" },
                "size": { "value": 1.5 },
                "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
