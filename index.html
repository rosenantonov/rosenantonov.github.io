    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        .gold { color: #d4af37; }
        
        /* Проста и сигурна анимация за името */
        .dust-name { font-size: 2.2rem; text-transform: uppercase; color: #d4af37; margin: 30px 0 5px 0; letter-spacing: 4px; animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .sub-title { color: #d4af37; opacity: 0.8; font-size: 0.9rem; margin-bottom: 25px; }

        /* Огнено появяване на снимките */
        .fire-box { width: 90%; max-width: 400px; margin: 15px auto; border: 1px solid #d4af37; border-radius: 10px; box-shadow: 0 0 20px #ff4500; animation: firePop 1.5s ease-out; }
        @keyframes firePop { 0% { transform: scale(0.5); filter: brightness(3); } 100% { transform: scale(1); filter: brightness(1); } }
        .fire-box img { width: 100%; display: block; border-radius: 10px; }

        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; }
        .btn { padding: 10px 20px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; font-size: 12px; border-radius: 5px; text-transform: uppercase; }
        
        .card { width: 90%; max-width: 700px; margin: 20px auto; background: #111; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        video { width: 100%; border-radius: 8px; display: block; }
        
        .section { border-top: 1px solid #333; margin-top: 40px; padding: 20px; }
    </style>
</head>
