<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | LIVING HIGH-TECH</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            background: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 50px;
            overflow-x: hidden;
            cursor: default;
        }

        /* ЖИВ ИНТЕРАКТИВЕН ФОН */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0; left: 0;
            opacity: 0.6;
        }

        .gold { color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.7); }

        /* ИМЕ - ЗЛАТЕН ПРАХ С ПУЛСИРАНЕ */
        .dust-name { 
            font-size: 2.8rem; 
            text-transform: uppercase; 
            color: #d4af37; 
            margin: 120px 0 5px 0; 
            letter-spacing: 6px; 
            display: inline-block; 
            position: relative;
            animation: textPulse 4s infinite alternate; /* Пулсиране */
        }
        .dust-name span { 
            opacity: 0; 
            display: inline-block;
            animation: dustAssemble 1.5s forwards; 
        }
        @keyframes dustAssemble {
            0% { opacity: 0; transform: scale(4) rotate(30deg); filter: blur(15px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); text-shadow: 0 0 25px #d4af37; }
        }
        @keyframes textPulse {
            0% { text-shadow: 0 0 15px #d4af37; filter: brightness(1); }
            100% { text-shadow: 0 0 30px #d4af37, 0 0 10px #fff; filter: brightness(1.2); }
        }

        .sub-title { 
            color: rgba(212, 175, 55, 0.8); 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 40px;
            animation: fadeIn 2s forwards;
        }

        /* СНИМКИ - ОГЪН И ДИНАМИКА ПРИ ХОВЪР */
        .fire-photo-container { 
            position: relative; 
            width: 90%; 
            max-width: 450px; 
            margin: 0 auto 50px auto; 
            perspective: 1000px; /* За 3D ефект */
        }
        .fire-core { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0); 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, #fff, #ffda44, #ff8c00, #ff4500, transparent 70%); 
            border-radius: 50%; 
            filter: blur(20px); 
            animation: fireBirth 2s 1s ease-out forwards; 
            z-index: 1; 
        }
        .fire-img-box { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            opacity: 0; 
            transform: scale(0.5) rotateY(90deg); 
            animation: photoFromFire 2s 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            position: relative; 
            z-index: 2; 
            margin-bottom: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: 0.6s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .fire-img-box:hover {
            transform: scale(1.05) rotateY(0deg) !important;
            border-color: #d4af37;
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.6);
            filter: brightness(1.1);
        }
        .fire-img-box img { width: 100%; display: block; }
        .img-box-2 { animation-delay: 2s; }

        @keyframes fireBirth {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(4); }
            100% { transform: translate(-50%, -50%) scale(7); opacity: 0; }
        }
        @keyframes photoFromFire {
            0% { opacity: 0; transform: scale(0.5) rotateY(90deg); filter: brightness(3); }
            100% { opacity: 1; transform: scale(1) rotateY(0deg); }
        }

        /* МЕНЮ С НЕОНОВ ЕФЕКТ */
        .nav {
            position: sticky; top: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            z-index: 100;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .btn {
            padding: 11px 18px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn:hover { 
            background: #d4af37; 
            color: #000; 
            box-shadow: 0 0 25px #d4af37, 0 0 10px #d4af37;
            transform: scale(1.05);
        }
        .btn::after { /* Блясък при ховър */
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            transform: scale(0); transition: 0.5s; opacity: 0;
        }
        .btn:hover::after { transform: scale(1); opacity: 1; }

        /* КАРТИ - НЕОНОВ ОРЕОЛ ПРИ ХОВЪР */
        .card {
            width: 90%; max-width: 800px;
            margin: 35px auto;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: 0.5s;
        }
        .card:hover {
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1);
            transform: translateY(-5px) scale(1.01);
        }
        video { width: 100%; border-radius: 10px; display: block; background: #000; outline: none; }

        .section { border-top: 1px solid rgba(212, 175, 55, 0.3); margin: 60px auto; padding: 40px; max-width: 800px; transition: 0.5s; }
        .section:hover { background: rgba(212,175,55, 0.02); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="nav">
        <a href="#video-section" class="btn">Видео</a>
        <a href="#" class="btn">Галерия</a>
        <a href="#" class="btn">Live Streaming</a>
        <a href="#buy" class="btn">Купи</a>
        <a href="#partners" class="btn">Партньори</a>
        <a href="https://www.facebook.com/share/1BcLUTBR9o/" target="_blank" class="btn">Facebook</a>
    </nav>

    <h1 class="dust-name">
        <span>R</span><span>o</span><span>s</span><span>e</span><span>n</span> <span>A</span><span>n</span><span>t</span><span>o</span><span>n</span><span>o</span><span>v</span>
    </h1>
    <p class="sub-title gold">Dramatic Tenor</p>

    <div class="fire-photo-container">
        <div class="fire-core"></div>
        <div class="fire-img-box">
            <img src="Messenger_creation_C64CCDF5-691E-4660-8E46-8EA59F954DC8.png" alt="Rosen 1">
        </div>
        <div class="fire-img-box img-box-2">
            <img src="Messenger_creation_D203DD09-6636-495B-A897-813892527065.png" alt="Rosen 2">
        </div>
    </div>

    <div id="video-section" class="card" data-aos="fade-up">
        <video controls playsinline><source src="Video1.mp4" type="video/mp4"></video>
    </div>

    <div class="card" data-aos="fade-up">
        <video controls playsinline><source src="Video3.mp4" type="video/mp4"></video>
    </div>

    <div id="buy" class="section" data-aos="zoom-in">
        <h2 class="gold">КУПИ</h2>
        <p>Очаквайте скоро дигитални билети и албуми.</p>
    </div>

    <div id="partners" class="section" data-aos="fade-up">
        <h2 class="gold">ПАРТНЬОРИ</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({ duration: 1200, once: true });

        // Анимация за името (златен прах)
        document.querySelectorAll('.dust-name span').forEach((span, index) => {
            span.style.animationDelay = `${index * 0.1}s`;
        });

        // Настройка на ЖИВИЯ фон
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 90, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { 
                    "onhover": { "enable": true, "mode": "grab" }, /* Частиците се свързват с мишката */
                    "onclick": { "enable": true, "mode": "push" } 
                },
                "modes": { 
                    "grab": { "distance": 200, "line_linked": { "opacity": 0.5 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
