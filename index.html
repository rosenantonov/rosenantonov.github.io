<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | DRAMATIC TENOR</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.07); }
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            text-align: center; 
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* АНИМИРАНО ЗАГЛАВИЕ "ЗЛАТЕН ПРАХ" */
        .hero-name { 
            font-size: 3rem; 
            text-transform: uppercase; 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 200% auto;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 40px 0 10px 0; 
            font-weight: bold; 
            letter-spacing: 8px;
            animation: gatherDust 3s ease-out forwards, shine 5s linear infinite;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        @keyframes gatherDust {
            0% {
                opacity: 0;
                letter-spacing: 25px;
                filter: blur(20px) brightness(2);
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                letter-spacing: 5px;
                filter: blur(0px) brightness(1);
                transform: scale(1);
            }
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .sub-title {
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 30px;
            animation: fadeIn 4s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.8; } }

        .main-photo { 
            width: 90%; max-width: 500px; border-radius: 15px; border: 2px solid var(--gold); 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); margin: 20px auto; display: block;
        }

        .nav-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .btn-gold {
            padding: 12px 18px; background: transparent; color: var(--gold); border: 1px solid var(--gold);
            text-decoration: none; border-radius: 5px; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; flex: 1 1 140px; max-width: 200px;
        }
        .btn-gold:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .btn-buy { background: var(--gold); color: black; font-weight: bold; }

        .video-card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); margin: 25px auto; max-width: 800px; width: 90%; }
        h2 { color: var(--gold); text-transform: uppercase; font-size: 1rem; margin-bottom: 15px; letter-spacing: 2px; }
        video { width: 100%; border-radius: 10px; background: #000; }
        
        .footer { margin-top: 50px; color: var(--gold); font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
