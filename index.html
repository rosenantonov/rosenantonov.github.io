<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Росен Антонов - Личен Портал</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #e0e0e0;
            --gold: linear-gradient(45deg, #f1c40f, #e67e22, #f1c40f);
            --gold-text: #f1c40f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease-in-out;
            --main-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--main-font);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Анимиран Фон --- */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            background: linear-gradient(135deg, rgba(241, 196, 15, 0.1), rgba(230, 126, 34, 0.05));
            border-radius: 50%;
            animation: moveCircles 25s infinite alternate;
        }

        .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; }
        .circle:nth-child(2) { width: 300px; height: 300px; bottom: -50px; right: 20%; animation-delay: -5s; }
        .circle:nth-child(3) { width: 150px; height: 150px; top: 30%; right: 10%; animation-delay: -10s; }

        @keyframes moveCircles {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        /* --- Шапка --- */
        header {
            padding: 3rem 1rem;
            text-align: center;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        h1.gold-text {
            font-size: 3rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: nameEntrance 2s forwards;
            position: relative;
        }

        @keyframes nameEntrance {
            0% { transform: scale(0.8) translateY(-50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* --- Основна Секция --- */
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            gap: 2rem;
        }

        section {
            background: var(--glass-bg);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(30px);
            animation: sectionAppear 0.5s forwards;
        }

        section:nth-child(1) { animation-delay: 0.3s; }
        section:nth-child(2) { animation-delay: 0.6s; }
        section:nth-child(3) { animation-delay: 0.9s; }
        section:nth-child(4) { animation-delay: 1.2s; }
        section:nth-child(5) { animation-delay: 1.5s; }

        @keyframes sectionAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            display: flex;
            align-items: center;
            font-size: 1.8rem;
            color: var(--gold-text);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 i {
            margin-right: 15px;
            font-size: 1.5rem;
        }

        p { margin-bottom: 1.5rem; color: #bbb; }

        /* --- Мултимедийни Плейъри --- */
        .player-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
        }

        video, audio {
            width: 100%;
            border-radius: 10px;
            display: block;
        }
        
        audio {
            width: 100%;
            height: 40px;
            margin-top: -5px; /* Adjusting for aesthetic */
        }

        /* --- Галерия --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            position: relative;
            background: #222;
            padding-bottom: 75%; /* 4:3 Aspect Ratio for placeholders */
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: scale(1.05);
            border-color: #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        .gallery-item img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        /* --- Бутони и Лайв Стрийминг --- */
        .live-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #ff4d4d; /* Red for live indicator */
            color: #ff4d4d;
            font-size: 1.2rem;
            position: relative;
            overflow: hidden;
        }

        .live-player::before {
            content: 'LIVE';
            position: absolute;
            top: 10px; right: 10px;
            padding: 5px 15px;
            background-color: #ff0000;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .action-btn {
            padding: 12px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .action-btn i {
            margin-right: 10px;
            color: var(--gold-text);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #f1c40f;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.2);
        }

        .action-btn.primary {
            background: linear-gradient(45deg, #e67e22, #f1c40f);
            color: #000;
            border: none;
            font-weight: bold;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            background: var(--glass-bg);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <header>
        <h1 class="gold-text">RosenAntonov</h1>
        <div class="button-group" style="justify-content: center; margin-top: 1.5rem;">
            <a href="#video" class="action-btn">Видео</a>
            <a href="#audio" class="action-btn">Аудио</a>
            <a href="#gallery" class="action-btn">Галерия</a>
            <a href="#live" class="action-btn primary">На Живо</a>
        </div>
    </header>

    <main>

        <section id="video">
            <h2><i class="fas fa-video"></i> Видео Портал</h2>
            <p>Последни проекти и видеа.</p>
            <div class="player-container">
                <video controls preload="metadata">
                    <source src="assets/sample-video.mp4" type="video/mp4">
                    Вашият браузър не поддържа видео.
                </video>
            </div>
        </div>
        </section>

        <section id="audio">
            <h2><i class="fas fa-volume-up"></i> Аудио Албуми</h2>
            <p>Звукови записи и музика.</p>
            <div class="player-container" style="background: var(--glass-bg); padding: 10px; border: 1px solid var(--glass-border);">
                <audio controls>
                    <source src="assets/sample-audio.mp3" type="audio/mpeg">
                    Вашият браузър не поддържа аудио.
                </audio>
            </div>
        </section>

        <section id="gallery">
            <h2><i class="fas fa-images"></i> Фото Галерия</h2>
            <p>Визуална колекция от моменти.</p>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://via.placeholder.com/300" alt="Снимка 1">
                </div>
                <div class="gallery-item">
                    <img src="https://via.placeholder.com/300" alt="Снимка 2">
                </div>
                <div class="gallery-item">
                    <img src="https://via.placeholder.com/300" alt="Снимка 3">
                </div>
                <div class="gallery-item">
                    <img src="https://via.placeholder.com/300" alt="Снимка 4">
                </div>
            </div>
        </section>

        <section id="live">
            <h2><i class="fas fa-broadcast-tower"></i> Live Streaming</h2>
            <p>Гледайте на живо.</p>
            <div class="live-player">
                Очаквайте излъчване...
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2023 RosenAntonov. Всички права запазени.</p>
        <div class="button-group" style="justify-content: center; margin-top: 1rem;">
            <a href="#" class="action-btn">Facebook</a>
            <a href="#" class="action-btn">Instagram</a>
            <a href="#" class="action-btn">GitHub</a>
        </div>
    </footer>

</body>
</html>
