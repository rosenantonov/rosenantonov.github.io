<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | DYNAMIC FIRE VIDEO</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            background: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; 
            top: 0; left: 0;
            opacity: 0.5;
        }

        .gold { color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.7); }

        .hero-name {
            font-size: 3rem;
            margin-top: 100px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #d4af37;
        }

        .sub-title {
            font-size: 1rem;
            letter-spacing: 4px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* КОНТЕЙНЕР ЗА ВИДЕО КАРТАТА */
        .video-card-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            perspective: 1000px; /* За 3D ефект при ховър */
            cursor: pointer;
        }

        /* КАРТАТА */
        .card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.5s, border-color 0.5s, box-shadow 0.5s;
            position: relative;
            z-index: 2; /* Над огъня */
            overflow: hidden;
        }

        /* ОГНЕНОТО ЯДРО (СКРИТО ПО ПОДРАЗБИРАНЕ) */
        .fire-blast {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100px; height: 100px;
            background: radial-gradient(circle, #fff, #ffda44, #ff8c00, #ff4500, transparent 70%);
            border-radius: 50%;
            filter: blur(15px);
            z-index: 1; /* Под видеото */
            opacity: 0;
            pointer-events: none; /* Да не пречи на клика */
        }

        /* АНИМАЦИЯ: ОГНЕНО ИЗБУХВАНЕ (Прилага се през JS) */
        .fire-ignite {
            animation: fireBlastEffect 1.5s ease-out forwards;
        }

        @keyframes fireBlastEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(5); filter: blur(5px); }
            100% { transform: translate(-50%, -50%) scale(8); opacity: 0; filter: blur(20px); }
        }

        /* АНИМАЦИЯ: ВИДЕОТО СЕ "ПУКА" ПРИ КЛИК (Прилага се през JS) */
        .video-pop {
            animation: videoPopEffect 0.5s ease-out forwards;
        }

        @keyframes videoPopEffect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(3); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .video-card-container:hover .card {
            border-color: #d4af37;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            transform: scale(1.02) rotateX(2deg);
        }

        video { 
            width: 100%; 
            border-radius: 15px; 
            outline: none; 
            transition: 0.5s;
        }

        .nav {
            position: sticky; top: 0;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            z-index: 100;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: #d4af37; color: black; box-shadow: 0 0 20px #d4af37; }

        .section-title { margin-top: 60px; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="nav">
        <a href="#video" class="btn">Видео</a>
        <a href="#gallery" class="btn">Галерия</a>
        <a href="#live" class="btn">Live</a>
        <a href="#buy" class="btn">Купи</a>
        <a href="#partners" class="btn">Партньори</a>
        <a href="https://www.facebook.com/share/1BcLUTBR9o/" target="_blank" class="btn">Facebook</a>
    </nav>

    <h1 class="hero-name" data-aos="zoom-in">Rosen Antonov</h1>
    <p class="sub-title gold" data-aos="fade-up" data-aos-delay="300">Dramatic Tenor</p>

    <div id="video" class="video-card-container" data-aos="fade-right" onclick="igniteVideo(this)">
        <div class="fire-blast"></div>
        <div class="card">
            <h3 class="gold">Performance I</h3>
            <video preload="metadata"><source src="Video1.mp4" type="video/mp4"></video>
        </div>
    </div>

    <div class="video-card-container" data-aos="fade-left" onclick="igniteVideo(this)">
        <div class="fire-blast"></div>
        <div class="card">
            <h3 class="gold">Performance II</h3>
            <video preload="metadata"><source src="FDownloader.Net_AQN_GbNG7R93pf46vNMLzZbz8tTQwWl9o8xbG0QFnJorZ_RF36xP8cY4gzMF90psmFfVvYeRb-S2PWPJtDxDLkMx6bZAIndfy5uvJd0YNw_360p_(SD).mp4" type="video/mp4"></video>
        </div>
    </div>

    <div id="gallery" class="section-title gold" data-aos="fade-up">Галерия</div>
    <div class="video-card-container card" data-aos="zoom-in">
        <p>Очаквайте снимки тук...</p>
    </div>

    <div id="live" class="section-title gold" data-aos="fade-up">Live Streaming</div>
    <div class="video-card-container card" data-aos="zoom-in">
        <p>Стриймингът ще бъде активен скоро.</p>
    </div>

    <div id="buy" class="video-card-container card" data-aos="zoom-in-up">
        <h2 class="gold">Очаквайте скоро</h2>
        <p>Динамични билети и записи</p>
    </div>

    <div id="partners" class="section-title gold" data-aos="fade-up">Партньори</div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
            }
        });

        // ДИНАМИЧЕН ОГНЕН ЕФЕКТ ПРИ КЛИК
        function igniteVideo(container) {
            const fireBlast = container.querySelector('.fire-blast');
            const card = container.querySelector('.card');
            const video = container.querySelector('video');

            // 1. Активираме Огнения взрив
            fireBlast.classList.remove('fire-ignite'); // Рестартираме анимацията, ако е кликнато пак
            void fireBlast.offsetWidth; // Тригърваме рендериране
            fireBlast.classList.add('fire-ignite');

            // 2. Видеото "избухва" и се появява
            card.classList.remove('video-pop');
            void card.offsetWidth;
            card.classList.add('video-pop');

            // 3. Ако видеото не е пуснато, го пускаме след кратка пауза (да се види огъня)
            if (video && video.paused) {
                setTimeout(() => {
                    video.play();
                }, 300); // Пускаме видеото след 0.3 секунди
            }
        }
    </script>
</body>
</html>
