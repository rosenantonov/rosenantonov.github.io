<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | HIGH-TECH TENOR</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            background: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* КОНТЕЙНЕР ЗА ЧАСТИЦИТЕ (ЗЛАТЕН ПРАХ) */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; /* Стои зад всичко */
            top: 0; left: 0;
        }

        .gold { color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.7); }

        /* ИМЕ С ГЛИЧ ЕФЕКТ */
        .hero-name {
            font-size: 3rem;
            margin-top: 100px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #d4af37;
        }

        .sub-title {
            font-size: 1rem;
            letter-spacing: 4px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* ТЕХНОЛОГИЧНИ КАРТИ */
        .card {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px); /* Стъклен ефект */
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
            transition: 0.5s;
        }
        .card:hover {
            border-color: #d4af37;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            transform: translateY(-10px);
        }

        video { width: 100%; border-radius: 15px; }

        .nav {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: #d4af37; color: black; box-shadow: 0 0 20px #d4af37; }

        .fire-img {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            border: 2px solid #d4af37;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="nav">
        <a href="#video" class="btn">Video</a>
        <a href="#buy" class="btn">Купи</a>
        <a href="https://www.facebook.com/share/1BcLUTBR9o/" target="_blank" class="btn">Facebook</a>
    </nav>

    <h1 class="hero-name" data-aos="zoom-in">Rosen Antonov</h1>
    <p class="sub-title gold" data-aos="fade-up" data-aos-delay="300">Dramatic Tenor</p>

    <div data-aos="flip-left" data-aos-duration="1500">
        <img src="Messenger_creation_C64CCDF5-691E-4660-8E46-8EA59F954DC8.png" class="fire-img">
    </div>

    <div id="video" class="card" data-aos="fade-right">
        <h3 class="gold">Performance I</h3>
        <video controls><source src="Video1.mp4" type="video/mp4"></video>
    </div>

    <div class="card" data-aos="fade-left">
        <h3 class="gold">Performance II</h3>
        <video controls><source src="FDownloader.Net_AQN_GbNG7R93pf46vNMLzZbz8tTQwWl9o8xbG0QFnJorZ_RF36xP8cY4gzMF90psmFfVvYeRb-S2PWPJtDxDLkMx6bZAIndfy5uvJd0YNw_360p_(SD).mp4" type="video/mp4"></video>
    </div>

    <div id="buy" class="card" data-aos="zoom-in-up">
        <h2 class="gold">Очаквайте скоро</h2>
        <p>Динамични билети и записи</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Активиране на анимациите при скрол
        AOS.init();

        // Конфигурация на златния прах
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });
    </script>
</body>
</html>
