<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | DRAMATIC TENOR</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.07); }
        body { 
            background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; text-align: center; padding-bottom: 50px; overflow-x: hidden; scroll-behavior: smooth;
        }
        .lang-switch { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .lang-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 5px 10px; cursor: pointer; font-size: 0.8rem; margin-left: 5px; border-radius: 3px;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--gold); color: black; }
        .hero-name { 
            font-size: 3rem; text-transform: uppercase; 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin: 60px 0 10px 0; font-weight: bold; letter-spacing: 8px;
            animation: gatherDust 3.5s ease-out forwards, shine 5s linear infinite;
        }
        @keyframes gatherDust {
            0% { opacity: 0; letter-spacing: 25px; filter: blur(20px); transform: scale(1.3); }
            100% { opacity: 1; letter-spacing: 5px; filter: blur(0px); transform: scale(1); }
        }
        @keyframes shine { to { background-position: 200% center; } }
        .sub-title { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 30px; opacity: 0.8; }
        .nav-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .btn-gold {
            padding: 12px 18px; background: transparent; color: var(--gold); border: 1px solid var(--gold);
            text-decoration: none; border-radius: 5px; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; flex: 1 1 140px; max-width: 200px;
        }
        .btn-gold:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .video-card-clean { background: var(--glass); padding: 10px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); margin: 25px auto; max-width: 800px; width: 90%; }
        video { width: 100%; border-radius: 15px; background: #000; display: block; }
        .footer { margin-top: 50px; color: var(--gold); font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="changeLang('bg')">BG</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
        <button class="lang-btn" onclick="changeLang('ru')">RU</button>
    </div>

    <h1 class="hero-name">Rosen Antonov</h1>
    <div class="sub-title" id="subTitle">Dramatic Tenor</div>
    
    <div class="nav-container">
        <a href="#" class="btn-gold" id="nav-gallery">Галерия</a>
        <a href="#" class="btn-gold" id="nav-live">Live Streaming</a>
        <a href="#" class="btn-gold" id="nav-perf">Performances</a>
        <a href="#" class="btn-gold" id="nav-news">News</a>
        <a href="#" class="btn-gold" id="nav-about">About</a>
        <a href="https://www.facebook.com/share/1BcLUTBR9o/" target="_blank" class="btn-gold" id="nav-contacts">Contacts</a>
    </div>

    <div class="video-card-clean"><video controls><source src="video1.mp4" type="video/mp4"></video></div>
    <div class="video-card-clean"><video controls><source src="video2.mp4" type="video/mp4"></video></div>
    <div class="video-card-clean"><video controls><source src="video3.mp4" type="video/mp4"></video></div>

    <div class="footer">PROFESSIONAL PORTFOLIO &copy; 2026</div>

    <script>
        const translations = {
            bg: { sub: "Драматичен Тенор", gallery: "Галерия", live: "На Живо", perf: "Изпълнения", news: "Новини", about: "За мен", contacts: "Контакти" },
            en: { sub: "Dramatic Tenor", gallery: "Gallery", live: "Live Streaming", perf: "Performances", news: "News", about: "About", contacts: "Contacts" },
            ru: { sub: "Драматический Тенор", gallery: "Галерея", live: "Прямой эфир", perf: "Выступления", news: "Новости", about: "Обо мне", contacts: "Контакты" }
        };
        function changeLang(lang) {
            document.getElementById('subTitle').innerText = translations[lang].sub;
            document.getElementById('nav-gallery').innerText = translations[lang].gallery;
            document.getElementById('nav-live').innerText = translations[lang].live;
            document.getElementById('nav-perf').innerText = translations[lang].perf;
            document.getElementById('nav-news').innerText = translations[lang].news;
            document.getElementById('nav-about').innerText = translations[lang].about;
            document.getElementById('nav-contacts').innerText = translations[lang].contacts;
        }
    </script>
</body>
</html>
