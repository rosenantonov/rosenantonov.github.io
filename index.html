<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | THE LEGEND</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }
        header {
            padding: 80px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .subtitle {
            font-size: clamp(0.7rem, 2vw, 1rem);
            letter-spacing: 6px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }
        
        /* Стил за видеото */
        .video-container {
            width: 90%;
            max-width: 900px;
            margin: 20px auto 60px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: #000;
        }
        video { width: 100%; display: block; }

        .container {
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            transition: 0.4s;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
        }
        .card h2 { color: var(--primary); margin-bottom: 15px; font-size: 1.5rem; }
        
        footer {
            text-align: center;
            padding: 60px;
            opacity: 0.4;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <header>
        <p class="subtitle">ГЛАСЪТ • ЕПОХАТА • ИКОНАТА</p>
        <h1>ROSEN ANTONOV</h1>
    </header>

    <div class="video-container">
        <video controls>
            <source src="https://raw.githubusercontent.com/rosenantonov/rosenantonov.github.io/main/DELAILAH%20%20ROSEN%20ANTONOV%20%D0%A0%D0%9E%D0%A1%D0%95%D0%9D%20%D0%90%D0%9D%D0%A2%D0%9E%D0%9D%D0%9E%D0%92%20(1).mp4" type="video/mp4">
            Вашият браузър не поддържа видео елемента.
        </video>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>💿 Дискография</h2>
                <p>Пълен архив на музикалните шедьоври и албуми.</p>
            </div>
            <div class="card">
                <h2>🎙️ История</h2>
                <p>Пътят от първата сцена до световния връх.</p>
            </div>
            <div class="card">
                <h2>📸 Галерия</h2>
                <p>Ексклузивни кадри и моменти, уловени във времето.</p>
            </div>
        </div>
    </div>

    <footer>DESIGNED FOR THE FUTURE &copy; 2026 ROSEN ANTONOV ARCHIVE</footer>
</body>
</html>
