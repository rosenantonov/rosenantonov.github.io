<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | DRAMATIC TENOR</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            text-align: center; 
            padding-bottom: 50px;
        }
        .hero-name { 
            font-size: 2.5rem; 
            text-transform: uppercase; 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 30px 0 10px 0; 
            font-weight: bold; 
            letter-spacing: 3px; 
        }
        .sub-title {
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .main-photo { 
            width: 90%; 
            max-width: 550px; 
            border-radius: 15px; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); 
        }
        
        .video-card { 
            background: rgba(255,255,255,0.03); 
            padding: 20px; 
            border-radius: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            margin: 25px auto; 
            max-width: 800px; 
            width: 90%; 
        }
        h2 { 
            color: var(--gold); 
            text-transform: uppercase; 
            font-size: 1rem; 
            margin-bottom: 20px; 
            letter-spacing: 2px; 
        }
        video { 
            width: 100%; 
            border-radius: 15px; 
            background: #000; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.6); 
        }
        
        .footer { 
            margin-top: 50px;
            padding: 20px; 
            color: var(--gold); 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            opacity: 0.5; 
        }
    </style>
</head>
<body>

    <h1 class="hero-name">Rosen Antonov</h1>

    <div class="gallery">

        <img src="Messenger_creation_D203DD09-6636-495B-A897-813892527065.png" alt="Rosen Antonov Gold" class="main-photo">
