<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | DRAMATIC TENOR</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.07); }
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            text-align: center; 
            padding-bottom: 50px;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* АНИМАЦИЯ ЗЛАТЕН ПРАХ */
        .hero-name { 
            font-size: 3rem; 
            text-transform: uppercase; 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 200% auto;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 40px 0 10px 0; 
            font-weight: bold; 
            letter-spacing: 8px;
            animation: gatherDust 3.5s ease-out forwards, shine 5s linear infinite;
        }

        .animated-statue {
            width: 90%; max-width: 500px; border-radius: 15px; border: 2px solid var(--gold);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4); margin: 20px auto; display: block;
            animation: gatherDustPhoto 4s ease-out forwards;
        }

        @keyframes gatherDust {
            0% { opacity: 0; letter-spacing: 25px; filter: blur(20px); transform: scale(1.3); }
            100% { opacity: 1; letter-spacing: 5px; filter: blur(0px); transform: scale(1); }
        }

        @keyframes gatherDustPhoto {
            0% { opacity: 0; filter: blur(30px); transform: scale(0.8); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes shine { to { background-position: 200% center; } }

        .sub-title { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 30px; opacity: 0.8; }

        .main-photo { width: 90%; max-width: 500px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.3); margin: 20px auto; display: block; }

        .nav-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .btn-gold {
            padding: 12px 18px; background: transparent; color: var(--gold); border: 1px solid var(--gold);
            text-decoration: none; border-radius: 5px; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; flex: 1 1 140px; max-width: 200px;
        }
        .btn-gold:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        .video-card-clean { background: var(--glass); padding: 10px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); margin: 25px auto; max-width: 800px; width: 90%; }
        video { width: 100%; border-radius: 15px; background: #000; display: block; }

        .partners-section {
            margin: 80px auto;
            max-width: 900px;
            padding: 40px 20px;
        }
        .partners-title {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .partners-line {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            width: 80%;
            margin: 0 auto;
            opacity: 0.3;
        }

        .footer { margin-top: 50px; color: var(--gold); font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
