<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; padding-bottom: 50px; }
        
        .lang-switch { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .lang-btn { background: none; color: var(--gold); border: 1px solid var(--gold); padding: 5px 8px; cursor: pointer; font-size: 0.7rem; border-radius: 4px; }

        .hero-name { 
            font-size: 2.4rem; text-transform: uppercase; margin: 60px 0 5px; letter-spacing: 5px; font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .sub-title { color: var(--gold); font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 30px; opacity: 0.8; }

        .nav-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 0 15px; margin-bottom: 30px; }
        .btn-gold { padding: 10px 15px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; border-radius: 5px; font-size: 0.7rem; text-transform: uppercase; flex: 1 1 120px; max-width: 180px; }

        .video-card { background: var(--glass); padding: 10px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); margin: 20px auto; width: 90%; max-width: 700px; }
        video { width: 100%; border-radius: 10px; display: block; background: #000; }
        
        .section-photo { width: 90%; max-width: 450px; border-radius: 15px; border: 1px solid var(--gold); margin: 25px auto; display: block; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        .content-section { margin: 40px auto; padding: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2); max-width: 700px; }
