<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        .gold { color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        /* Анимация: Златен Прах за Името */
        .dust-name { font-size: 2.2rem; text-transform: uppercase; color: #d4af37; margin: 30px 0 5px 0; letter-spacing: 4px; display: inline-block; position: relative; }
        .dust-name span { opacity: 0; animation: dustAssemble 1.5s forwards; display: inline-block; }
        @keyframes dustAssemble {
            0% { opacity: 0; transform: scale(3) rotate(20deg); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); text-shadow: 0 0 15px #d4af37; }
        }

        .sub-title { color: rgba(212, 175, 55, 0.8); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        /* Ефект: Поява от Огъня за Снимките */
        .fire-photo-container { position: relative; width: 90%; max-width: 450px; margin: 0 auto 20px auto; opacity: 0; animation: fadeInAfterName 0.5s 1.5s forwards; }
        .fire-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 100px; height: 100px; background: radial-gradient(circle, #fff, #ffda44, #ff8c00, #ff4500, transparent 70%); border-radius: 50%; filter: blur(10px); animation: fireBirth 2s 1.8s ease-out forwards; z-index: 1; }
        .fire-img-box { width: 100%; border-radius: 10px; overflow: hidden; opacity: 0; transform: scale(0.5) rotateY(90deg); animation: photoFromFire 2.5s 2.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; position: relative; z-index: 2; margin-bottom: 15px; }
        .fire-img-box img { width: 100%; display: block; border-radius: 10px; }
        .img-box-2 { animation-delay: 2.8s; }

        @keyframes fadeInAfterName { 100% { opacity: 1; } }
        @keyframes fireBirth {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(3); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }
        @keyframes photoFromFire {
            0% { opacity: 0; transform: scale(0.5) rotateY(90deg); filter: brightness(3); }
            100% { opacity: 1; transform: scale(1) rotateY(0deg); box-shadow: 0 0 15px 2px rgba(212, 175, 55, 0.5); border: 1px solid #d4af37; }
        }

        /* Меню и Бутони */
        .lang-switch { margin: 20px; display: flex; justify-content: center; gap: 10px; }
        .l-btn { background: none; border: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 6px 12px; cursor: pointer; border-radius: 5px; font-family: sans-serif; transition: 0.3s; }
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; max-width: 600px; margin: 0 auto; }
        .btn { padding: 10px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; font-size: 12px; min-width: 90px; text-transform: uppercase; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 15px #d4af37; }

        /* Графа Видео (Карти) */
        .card { width: 90%; max-width: 700px; margin: 20px auto; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.1); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 8px; display: block; outline: none; }

        .section { border-top: 1px solid rgba(212, 175, 55, 0.3); margin-top: 40px; padding: 25px; max-width: 700px; margin: 40px auto; }
    </style>
</head>
<body>

    <h1 class="dust-name" id="mainName">
        <span>R</span><span>o</span><span>s</span><span>e</span><span>n</span> <span>A</span><span>n</span><span>t</span><span>o</span><span>n</span><span>o</span><span>v</span>
    </h1>
    <p id="sub" class="sub-title gold">Dramatic Tenor
