<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | HIGH-TECH TENOR</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            background: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* КОНТЕЙНЕР ЗА ФОНА - ЗЛАТЕН ПРАХ */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0; left: 0;
            background-color: #000;
        }

        .gold { color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.7); }

        /* ИМЕ - СТАРИЯ ЕФЕКТ "ЗЛАТЕН ПРАХ" */
        .dust-name { 
            font-size: 2.5rem; 
            text-transform: uppercase; 
            color: #d4af37; 
            margin: 120px 0 10px 0; 
            letter-spacing: 6px; 
            display: inline-block; 
        }
        .dust-name span { 
            opacity: 0; 
            display: inline-block;
            animation: dustAssemble 1.2s forwards; 
        }
        @keyframes dustAssemble {
            0% { opacity: 0; transform: scale(4) rotate(25deg); filter: blur(12px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); text-shadow: 0 0 20px #d4af37; }
        }

        .sub-title { 
            color: rgba(212, 175, 55, 0.8); 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 40px;
        }

        /* СНИМКА - СТАРИЯ ЕФЕКТ "ОГНЕНО РАЖДАНЕ" */
        .fire-photo-container { 
            position: relative; 
            width: 90%; 
            max-width: 450px; 
            margin: 0 auto 50px auto; 
        }
        .fire-core { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0); 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, #fff, #ffda44, #ff8c00, #ff4500, transparent 70%); 
            border-radius: 50%; 
            filter: blur(20px); 
            animation: fireBirth 1.8s 0.8s ease-out forwards; 
            z-index: 1; 
        }
        .fire-img-box { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            opacity: 0; 
            transform: scale(0.8);
            animation: photoFromFire 1.5s 1.2s forwards; 
            position: relative; 
            z-index: 2; 
            border: 1px solid #d4af37;
        }
        .fire-img-box img { width: 100%; display: block; }

        @keyframes fireBirth {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(3.5); }
            100% { transform: translate(-50%, -50%) scale(6); opacity: 0; }
        }
        @keyframes photoFromFire {
            0% { opacity: 0; transform: scale(0.6); filter: brightness(3); }
            100% { opacity: 1; transform: scale(1); filter: brightness(1); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        }

        /* МЕНЮ */
        .nav {
            position: sticky; top: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            z-index: 100;
            display: flex; justify-content: center; gap: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .btn {
            padding: 10px 18px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 11px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px #d4af37; }

        /* КАРТИ ЗА ВИДЕО */
        .card {
            width: 90%; max-width: 800px;
            margin: 40px auto;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            transition: 0.4s;
        }
        video { width: 100%; border-radius: 10px; display: block; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="nav">
        <a href="#video-section" class="btn">Видео</a>
        <a href="#buy" class="btn">Купи</a>
        <a href="https://www.facebook.com/share/1BcLUTBR9o/" target="_blank" class="btn">Facebook</a>
    </nav>

    <h1 class="dust-name" id="mainName">
        <span>R</span><span>o</span><span>s</span><span>e</span><span>n</span> <span>A</span><span>n</span><span>t</span><span>o</span><span>n</span><span>o</span><span>v</span>
    </h1>
    <p class="sub-title gold">Dramatic Tenor</p>

    <div class="fire-photo-container">
        <div class="fire-core"></div>
        <div class="fire-img-box">
            <img src="Messenger_creation_C64CCDF5-691E-4660-8E46-8EA59F954DC8.png">
        </div>
    </div>

    <div id="video-section" class="card" data-aos="fade-up">
        <video controls><source src="Video1.mp4" type="video/mp4"></video>
    </div>

    <div class="card" data-aos="fade-up">
        <video controls><source src="Video3.mp4" type="video/mp4"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        // Стартираме анимациите при скрол
        AOS.init({ duration: 1000, once: true });

        // Анимация за буквите
        document.querySelectorAll('.dust-name span').forEach((span, index) => {
            span.style.animationDelay = `${index * 0.1}s`;
        });

        // Настройка на фона
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": false, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
