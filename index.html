<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | DRAMATIC TENOR</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            text-align: center;
        }

        /* Ефект на златния прах за заглавието */
        .hero-name {
            font-size: 2.5rem;
            text-transform: uppercase;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .main-photo {
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 30px;
        }

        .container {
            padding: 20px;
        }

        .video-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin: 20px auto;
            max-width: 800px;
        }

        h2 { color: var(--gold); text-transform: uppercase; font-size: 1.2rem; }

        video {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .btn-gold {
            display: inline-block;
            padding: 10px 25px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            text-decoration: none;
            border-radius: 50px;
            margin: 10px;
            transition: 0.3s;
        }

        .btn-gold:hover {
            background: var(--gold);
            color: black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="hero-name">Rosen Antonov</h1>
        
        <img src="1000000085.png" alt="Rosen Antonov Gold" class="main-photo">
