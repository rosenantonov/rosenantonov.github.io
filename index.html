<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSEN ANTONOV | THE NEXT GEN</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            background: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            z-index: -1; top: 0; left: 0;
            opacity: 0.4;
        }

        .gold { color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.7); }

        /* ИМЕ - ЗЛАТЕН ПРАХ (БУКВА ПО БУКВА) */
        .dust-name { 
            font-size: 3rem; 
            text-transform: uppercase; 
            color: #d4af37; 
            margin: 100px 0 10px 0; 
            letter-spacing: 8px; 
            display: inline-block; 
        }
        .dust-name span { 
            opacity: 0; 
            display: inline-block;
            animation: dustAssemble 1.5s forwards; 
        }
        @keyframes dustAssemble {
            0% { opacity: 0; transform: scale(5) rotate(45deg); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); text-shadow: 0 0 20px #d4af37; }
        }

        .sub-title { font-size: 1.1rem; letter-spacing: 5px; margin-bottom: 50px; opacity: 0.8; }

        /* КАРТИ И ВИДЕО ЕФЕКТИ */
        .video-card-container { position: relative; width: 90%; max-width: 800px; margin: 40px auto; cursor: pointer; }
        .card {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transition: 0.5s;
            position: relative; z-index: 2;
        }
        .fire-blast {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 100px; height: 100px;
            background: radial-gradient(circle, #fff, #ffda44, #ff8c00, #ff4500, transparent 70%);
            border-radius: 50%; opacity: 0; pointer-events: none; z-index: 1;
        }
        .fire-ignite { animation: fireBlastEffect 1.2s ease-out forwards; }
        @keyframes fireBlastEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(6); }
            100% { transform: translate(-50%, -50%) scale(10); opacity: 0; }
        }

        video, .statue-img { width: 100%; border-radius: 15px; transition: 0.5s; }

        /* МЕНЮ */
        .nav {
            position: sticky; top: 0; background: rgba(0,0,0,0.9);
            padding: 15px; z-index: 1000;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .btn {
            padding: 10px 20px; border: 1px solid #d4af37; color: #d4af37;
            text-decoration: none; text-transform: uppercase; font-size: 11px;
            border-radius: 5px; transition: 0.3s; font-weight: bold;
        }
        .btn:hover { background: #d4af37; color: black; box-shadow: 0 0 20px #d4af37; }

        /* 3D ОБЕКТ СЕКЦИЯ */
        .spline-container {
            width: 100%; height: 500px;
            margin: 40px 0;
            border-radius: 20px;
            overflow: hidden;
        }

        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="nav">
        <a href="#video" class="btn">Видео</a>
        <a href="#gallery" class="btn">Галерия</a>
        <a href="#partners" class="btn">3D Технологии</a>
        <a href="#buy" class="btn">Купи</a>
    </nav>

    <h1 class="dust-name">
        <span>R</span><span>o</span><span>s</span><span>e</span><span>n</span> <span>A</span><span>n</span><span>t</span><span>o</span><span>n</span><span>o</span><span>v</span>
    </h1>
    <p class="sub-title gold">Dramatic Tenor</p>

    <div data-aos="zoom-in" data-aos-duration="1500">
        <img src="Messenger_creation_C64CCDF5-691E-4660-8E46-8EA59F954DC8.png" style="max-width: 400px; border-radius: 20px; border: 1px solid #d4af37;">
    </div>

    <div id="video" class="video-card-container" data-aos="fade-up" onclick="ignite(this)">
        <div class="fire-blast"></div>
        <div class="card">
            <h3 class="gold">DYNAMIC PERFORMANCE</h3>
            <video controls><source src="Video1.mp4" type="video/mp4"></video>
        </div>
    </div>

    <div id="gallery" class="video-card-container" data-aos="fade-up">
        <div class="card">
            <h3 class="gold">GALLERY</h3>
            <img src="Messenger_creation_D203DD09-6636-495B-A897-813892527065.png" class="statue-img" alt="Rosen Statue">
        </div>
    </div>

    <div id="partners" class="video-card-container" data-aos="zoom-in">
        <h2 class="gold">ИНТЕРАКТИВНО 3D</h2>
        <div class="spline-container">
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.28/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/6Wq1Q7YGe9vWka9W/scene.splinecode"></spline-viewer>
        </div>
    </div>

    <div id="buy" class="card" style="margin: 50px auto; max-width: 800px;">
        <h2 class="gold">SHOP</h2>
        <p>Coming Soon...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        // Буква по буква анимация
        document.querySelectorAll('.dust-name span').forEach((s, i) => {
            s.style.animationDelay = `${i * 0.1}s`;
        });

        function ignite(el) {
            const f = el.querySelector('.fire-blast');
            f.classList.remove('fire-ignite');
            void f.offsetWidth;
            f.classList.add('fire-ignite');
        }

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
